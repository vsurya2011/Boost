<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Boost Da! | Pro Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.18.0.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');
        :root {
            --primary: #6366f1; --secondary: #f43f5e; --accent: #10b981;
            --bg: #050a18; --glass: rgba(255, 255, 255, 0.05);
        }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: white; margin: 0; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; transition: 0.5s; }
        .hidden { display: none !important; }

        .glass-card { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 28px; padding: 35px; width: 100%; max-width: 380px; text-align: center; }
        
        input { width: 100%; padding: 14px; margin: 10px 0; border-radius: 12px; border: none; background: rgba(255,255,255,0.1); color: white; outline: none; text-align: center; font-weight: 600; }
        input:focus { ring: 2px solid var(--primary); }

        .btn-glow { background: var(--primary); color: white; width: 100%; padding: 14px; border-radius: 12px; font-weight: 800; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; }
        .btn-glow:active { transform: scale(0.95); }

        /* Game Hand */
        .hand { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin: 20px 0; }
        .card {
            width: 75px; height: 110px; background: white; color: #1e293b;
            border-radius: 15px; display: flex; align-items: center; justify-content: center;
            font-weight: 900; cursor: pointer; border: 4px solid var(--primary);
            transition: 0.2s; text-transform: uppercase; font-size: 0.7rem; text-align: center; padding: 5px;
        }
        .card:hover { transform: translateY(-5px); border-color: var(--accent); }

        #boost-btn {
            height: 80px; font-size: 1.5rem; background: var(--secondary);
            width: 100%; max-width: 300px; display: none;
            animation: pulse 0.8s infinite; border-radius: 20px;
        }
        .locked { filter: grayscale(1); opacity: 0.5; pointer-events: none; animation: none !important; }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(244, 63, 94, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(244, 63, 94, 0); }
            100% { transform: scale(1); }
        }

        #chat-window {
            position: fixed; bottom: 90px; right: 20px; width: 280px; height: 350px;
            background: rgba(15, 23, 42, 0.98); backdrop-filter: blur(15px);
            border-radius: 20px; border: 1px solid var(--primary);
            display: flex; flex-direction: column; z-index: 100; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .player-chip { background: var(--primary); padding: 6px 12px; border-radius: 99px; font-size: 10px; font-weight: 800; margin: 4px; display: inline-block; text-transform: uppercase; }
        .voice-active { border: 2px solid var(--secondary); animation: voice-pulse 1.5s infinite; }
        @keyframes voice-pulse { 0% { box-shadow: 0 0 0 0 rgba(244, 63, 94, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(244, 63, 94, 0); } 100% { box-shadow: 0 0 0 0 rgba(244, 63, 94, 0); } }

        /* Floating Notify */
        #notify-toast {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            background: var(--accent); color: white; padding: 15px 30px;
            border-radius: 50px; font-weight: 800; z-index: 1000;
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(16, 185, 129, 0.4);
            white-space: nowrap; border: 2px solid rgba(255,255,255,0.2);
        }
        #notify-toast.show { top: 30px; }
    </style>
</head>
<body>

<div id="notify-toast">NEW GAME STARTED! 🚀</div>

<div id="step-1" class="screen">
    <div class="glass-card">
        <h1 class="text-4xl font-800 mb-4" style="color:var(--primary)">BOOST DA!</h1>
        <input type="text" id="username" placeholder="Enter Your Nickname"class="w-full bg-slate-800 border border-slate-700 p-4 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 text-white">
        <button class="btn-glow" onclick="goToRooms()">NEXT</button>
    </div>
</div>

<div id="step-2" class="screen hidden">
    <div class="glass-card">
        <h2 class="text-xl mb-6 font-600">Hey <span id="user-span" style="color:var(--accent)"></span></h2>
        <button class="btn-glow" onclick="createRoom()" style="background:var(--accent)">CREATE ROOM</button>
        <div class="my-4 opacity-50 font-800">OR</div>
        <input type="text" id="join-code" placeholder="4-Digit Code" maxlength="4" class="w-full bg-slate-800 border border-slate-700 p-3 rounded-2xl outline-none focus:ring-2 focus:ring-yellow-500 text-white">
        <button class="btn-glow" onclick="joinRoom()">JOIN ROOM</button>
    </div>
</div>

<div id="step-3" class="screen hidden">
    <div class="glass-card">
        <h3 class="text-lg font-800 mb-2">Room: <span id="code-span" style="color:var(--primary)"></span></h3>
        <p class="text-[10px] uppercase opacity-60 tracking-widest mb-4">Players Connected</p>
        <div id="lobby-list" class="mb-6"></div>
        <hr class="opacity-10 mb-6">
        <input type="text" id="card-name" placeholder="Secret Card (e.g. APPLE)" maxlength="10">
        <button class="btn-glow" onclick="enterGame()">READY TO BOOST</button>
    </div>
</div>

<div id="game-screen" class="screen hidden">
    <div class="fixed top-6 w-full px-6 flex justify-between items-center">
        <div class="flex flex-col">
            <span id="room-display" class="text-[10px] font-800 tracking-tighter opacity-60">CODE: ----</span>
            <span id="score-display" class="text-accent font-800 text-lg">PTS: 0</span>
        </div>
        <button onclick="toggleMic()" id="mic-btn" class="p-3 bg-slate-800 rounded-xl text-secondary">
            <i class="fa fa-microphone-slash"></i>
        </button>
    </div>

    <div id="active-players" class="mt-20 flex flex-wrap justify-center"></div>
    <h3 id="status-text" class="text-yellow-400 font-800 text-center my-6 text-sm uppercase tracking-widest">WAITING FOR HOST...</h3>

    <div class="hand" id="my-hand"></div>

    <button id="boost-btn" class="btn-glow shadow-2xl" onclick="pressBoost()">🚀 BOOST!!</button>

    <div id="host-panel" class="hidden fixed bottom-10 flex gap-3">
        <button onclick="rollGame()" class="px-8 py-4 bg-emerald-500 rounded-2xl font-800 shadow-lg active:scale-95">🎲 ROLL</button>
        <button onclick="calcRank()" class="px-8 py-4 bg-rose-500 rounded-2xl font-800 shadow-lg active:scale-95">🔚 END</button>
    </div>
</div>

<div id="rank-screen" class="screen hidden">
    <div class="glass-card">
        <h2 class="text-3xl font-800 text-yellow-400 mb-6 italic">🏆 CHAMPIONS</h2>
        <div id="rank-list" class="space-y-3 mb-6 text-left"></div>
        <button class="btn-glow" onclick="location.reload()">HOME</button>
    </div>
</div>

<div id="chat-window" class="hidden">
    <div class="flex justify-between items-center p-3 border-b border-white/10">
        <span class="text-[10px] font-800 uppercase tracking-widest opacity-50">Team Chat</span>
        <button onclick="toggleChat()" class="text-secondary hover:text-white transition"><i class="fa fa-times-circle text-lg"></i></button>
    </div>
    <div id="chat-msgs" class="flex-1 overflow-y-auto p-4 space-y-2 text-[12px]"></div>
    <div class="flex p-3 gap-2 bg-slate-900/50 rounded-b-2xl">
        <input type="text" id="chat-input" placeholder="Message..." class="m-0 py-2 text-xs">
        <button onclick="sendMsg()" class="bg-primary px-4 rounded-xl"><i class="fa fa-paper-plane"></i></button>
    </div>
</div>

<button onclick="toggleChat()" class="fixed bottom-6 right-6 w-14 h-14 bg-primary rounded-full shadow-2xl z-[200] flex items-center justify-center">
    <i class="fa fa-comment text-xl"></i>
</button>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, push, update, onChildAdded, get } 
        from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBLX8s2CgDR1Ft8C33wLWvowKYrX98UeAA",
        authDomain: "boost-48cf6.firebaseapp.com",
        projectId: "boost-48cf6",
        storageBucket: "boost-48cf6.firebasestorage.app",
        messagingSenderId: "303447637204",
        appId: "1:303447637204:web:075099afdcc912eebfcf41",
        measurementId: "G-33PZRBSCHH"
    };

    const AGORA_APP_ID = "01e39fd5fde54f2ca6c93c2f0c641ff5";
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const rtc = { client: AgoraRTC.createClient({ mode: "rtc", codec: "vp8" }), localAudioTrack: null };

    let myId, myName, myRoom, myCard, amIHost = false, isVoice = false;
    let playerList = [];
    let hasMatchNotifyPlayed = false;

    window.goToRooms = () => {
        myName = document.getElementById('username').value.trim();
        if(!myName) return;
        document.getElementById('user-span').innerText = myName;
        showScreen('step-2');
    };

    window.createRoom = () => {
        myRoom = Math.random().toString(36).substring(2, 6).toUpperCase();
        amIHost = true;
        enterConfig();
    };

    window.joinRoom = () => {
        myRoom = document.getElementById('join-code').value.trim().toUpperCase();
        if(myRoom.length !== 4) return alert("Code is 4 characters!");
        amIHost = false;
        enterConfig();
    };

    function enterConfig() {
        document.getElementById('code-span').innerText = myRoom;
        showScreen('step-3');
        onValue(ref(db, `rooms/${myRoom}/players`), (snap) => {
            const data = snap.val();
            if(!data) return;
            const names = Object.values(data).map(p => p.name);
            document.getElementById('lobby-list').innerHTML = names.map(n => `<span class="player-chip">${n}</span>`).join('');
        });
    }

    window.enterGame = () => {
        myCard = document.getElementById('card-name').value.trim().toUpperCase();
        if(!myCard) return alert("Enter a secret card name!");
        myId = myName.replace(/\s+/g, '') + "_" + Math.floor(Math.random()*999);
        
        set(ref(db, `rooms/${myRoom}/players/${myId}`), {
            id: myId, name: myName, cardType: myCard, hand: [], score: 0, isTalking: false
        });

        document.getElementById('room-display').innerText = "CODE: " + myRoom;
        showScreen('game-screen');
        syncArena();
    }

    function showNotify(text, color = 'var(--accent)') {
        const toast = document.getElementById('notify-toast');
        toast.innerText = text;
        toast.style.background = color;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 4000);
    }

    function syncArena() {
        onValue(ref(db, `rooms/${myRoom}`), (snap) => {
            const data = snap.val(); if(!data) return;
            const pIds = Object.keys(data.players);
            playerList = pIds.map(id => data.players[id]);
            
            if(pIds[0] === myId) {
                amIHost = true;
                document.getElementById('host-panel').classList.remove('hidden');
            }

            document.getElementById('active-players').innerHTML = playerList.map(p => `
                <div class="flex flex-col items-center m-2">
                    <span class="player-chip ${p.isTalking ? 'voice-active' : ''}">${p.name}</span>
                    <span class="text-[8px] opacity-40">CARDS: ${p.hand ? p.hand.length : 0}</span>
                </div>
            `).join('');

            const myData = data.players[myId];
            document.getElementById('score-display').innerText = `PTS: ${myData.score || 0}`;
            renderHand(myData.hand || []);

            // Check if match over (Everyone Boosted)
            const boostCount = data.boostRace ? Object.keys(data.boostRace).length : 0;
            if (boostCount > 0 && boostCount === playerList.length && !hasMatchNotifyPlayed) {
                const raceArr = Object.values(data.boostRace).sort((a,b) => a.time - b.time);
                const winnerId = raceArr[0].uid;
                const winnerName = data.players[winnerId].name;
                showNotify(`MATCH OVER! 🏆 ${winnerName} was 1st!`, 'var(--secondary)');
                hasMatchNotifyPlayed = true;
                if(amIHost) document.getElementById('status-text').innerText = "ALL BOOSTED! ROLL FOR NEW MATCH";
            }

            // Reset notification flag when host rolls (new game)
            if (!data.boostRace) {
                hasMatchNotifyPlayed = false;
            }

            // Global Notification Sync
            if (data.lastNotification && data.lastNotification.id !== window.lastNotifId) {
                showNotify(data.lastNotification.text, data.lastNotification.type === 'new' ? 'var(--accent)' : 'var(--secondary)');
                window.lastNotifId = data.lastNotification.id;
            }

            const boostBtn = document.getElementById('boost-btn');
            const hasThreeMatch = myData.hand?.length === 3 && myData.hand.every(v => v === myData.hand[0]);

            if (data.boostTriggeredBy) {
                boostBtn.style.display = 'block';
                // Locked if I already clicked it this match
                const alreadyClicked = data.boostRace && Object.values(data.boostRace).find(r => r.uid === myId);
                if(alreadyClicked) {
                    boostBtn.classList.add('locked');
                    document.getElementById('status-text').innerText = "BOOSTED! WAITING FOR OTHERS...";
                } else {
                    boostBtn.classList.remove('locked');
                    document.getElementById('status-text').innerText = "🚨 RACE! BOOST NOW!";
                }
            } else if (hasThreeMatch) {
                boostBtn.style.display = 'block';
                boostBtn.classList.remove('locked');
                document.getElementById('status-text').innerText = "💎 3 MATCHED! BOOST FAST!";
            } else {
                boostBtn.style.display = 'none';
                document.getElementById('status-text').innerText = "GAME ON! PASS CARDS";
            }

            if(data.isOver) showRank(playerList);
        });

        onChildAdded(ref(db, `rooms/${myRoom}/chat`), (snap) => {
            const m = snap.val();
            const div = document.getElementById('chat-msgs');
            div.innerHTML += `<div><span class="text-primary font-800">${m.u}:</span> ${m.t}</div>`;
            div.scrollTop = div.scrollHeight;
        });
    }

    window.rollGame = () => {
        if(!amIHost) return;
        let deck = [];
        playerList.forEach(p => { deck.push(p.cardType, p.cardType, p.cardType); });
        deck = deck.sort(() => Math.random() - 0.5);

        playerList.forEach(p => {
            update(ref(db, `rooms/${myRoom}/players/${p.id}`), { hand: deck.splice(0, 3) });
        });
        
        update(ref(db, `rooms/${myRoom}`), { 
            boostTriggeredBy: null, 
            boostRace: null, 
            isOver: false,
            lastNotification: {
                id: Date.now(),
                text: "🚀 NEW MATCH STARTED! CARDS ROLLED!",
                type: "new"
            }
        });
    };

    function renderHand(hand) {
        const container = document.getElementById('my-hand');
        container.innerHTML = '';
        hand.forEach((c, i) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerText = c;
            card.onclick = () => passCard(i, hand);
            container.appendChild(card);
        });
    }

    function passCard(idx, hand) {
        if(hand.length < 3) return;
        const myIdx = playerList.findIndex(p => p.id === myId);
        const nextP = playerList[(myIdx + 1) % playerList.length];

        const card = hand[idx];
        let newMe = [...hand]; newMe.splice(idx, 1);
        let nextHand = [...(nextP.hand || [])];
        
        if(nextHand.length >= 4) return; // Simple UI block

        nextHand.push(card);
        update(ref(db, `rooms/${myRoom}/players/${myId}`), { hand: newMe });
        update(ref(db, `rooms/${myRoom}/players/${nextP.id}`), { hand: nextHand });
    }

    window.pressBoost = () => {
        get(ref(db, `rooms/${myRoom}`)).then(snap => {
            const data = snap.val();
            // Check if I already clicked
            const alreadyClicked = data.boostRace && Object.values(data.boostRace).find(r => r.uid === myId);
            if(alreadyClicked) return;

            if(!data.boostTriggeredBy) {
                update(ref(db, `rooms/${myRoom}`), { boostTriggeredBy: myId });
            }
            push(ref(db, `rooms/${myRoom}/boostRace`), { uid: myId, time: Date.now() });
        });
    };

    window.calcRank = () => {
        if(!amIHost) return;
        get(ref(db, `rooms/${myRoom}/boostRace`)).then(snap => {
            const race = snap.val(); if(!race) return alert("No one boosted yet!");
            const sorted = Object.values(race).sort((a,b) => a.time - b.time);
            const pts = [2000, 1500, 1000, 800, 500, 200];
            
            sorted.forEach((r, i) => {
                const pRef = ref(db, `rooms/${myRoom}/players/${r.uid}`);
                get(pRef).then(pSnap => {
                    const currentScore = pSnap.val().score || 0;
                    update(pRef, { score: currentScore + (pts[i] || 100) });
                });
            });
            update(ref(db, `rooms/${myRoom}`), { isOver: true });
        });
    };

    function showRank(list) {
        showScreen('rank-screen');
        const sorted = list.sort((a,b) => (b.score || 0) - (a.score || 0)).slice(0, 3);
        document.getElementById('rank-list').innerHTML = sorted.map((p, i) => `
            <div class="flex justify-between items-center p-4 bg-white/5 rounded-2xl border border-white/10">
                <span class="font-800 text-sm">#${i+1} ${p.name}</span>
                <span class="text-accent font-800">${p.score} PTS</span>
            </div>
        `).join('');
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
    }

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    window.toggleChat = () => document.getElementById('chat-window').classList.toggle('hidden');
    window.sendMsg = () => {
        const inp = document.getElementById('chat-input');
        if(inp.value.trim()) push(ref(db, `rooms/${myRoom}/chat`), { u: myName, t: inp.value.trim() });
        inp.value = "";
    };

    window.toggleMic = async () => {
        isVoice = !isVoice;
        const btn = document.getElementById('mic-btn');
        if(isVoice) {
            try {
                await rtc.client.join(AGORA_APP_ID, myRoom, null, null);
                rtc.localAudioTrack = await AgoraRTC.createMicrophoneAudioTrack();
                await rtc.client.publish([rtc.localAudioTrack]);
                rtc.client.on("user-published", async (user, mediaType) => {
                    await rtc.client.subscribe(user, mediaType);
                    if (mediaType === "audio") user.audioTrack.play();
                });
                btn.classList.replace('text-secondary', 'text-accent');
                btn.innerHTML = '<i class="fa fa-microphone"></i>';
                update(ref(db, `rooms/${myRoom}/players/${myId}`), { isTalking: true });
            } catch(e) { isVoice = false; alert("Mic Error!"); }
        } else {
            await rtc.client.leave();
            if(rtc.localAudioTrack) { rtc.localAudioTrack.stop(); rtc.localAudioTrack.close(); }
            btn.classList.replace('text-accent', 'text-secondary');
            btn.innerHTML = '<i class="fa fa-microphone-slash"></i>';
            update(ref(db, `rooms/${myRoom}/players/${myId}`), { isTalking: false });
        }
    };
</script>
</body>
</html>
