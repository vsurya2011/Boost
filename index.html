<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Boost Da! | Pro Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.18.0.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');
        :root { --primary: #6366f1; --secondary: #f43f5e; --accent: #10b981; --bg: #050a18; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: white; margin: 0; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; transition: 0.5s; }
        .hidden { display: none !important; }
        
        #notify-toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-150%); background: var(--accent); color: white; padding: 12px 24px; border-radius: 50px; font-weight: 800; z-index: 1000; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; min-width: 200px; }
        #notify-toast.show { transform: translateX(-50%) translateY(0); }

        .btn-glow { background: var(--primary); color: white; width: 100%; padding: 14px; border-radius: 16px; font-weight: 800; transition: 0.3s; text-transform: uppercase; }
        .btn-glow:active { transform: scale(0.95); }

        .card { width: 75px; height: 110px; background: white; color: #1e293b; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-weight: 900; cursor: pointer; border: 4px solid var(--primary); transition: 0.2s; font-size: 0.7rem; text-align: center; padding: 5px; }
        
        #boost-btn { height: 80px; font-size: 1.5rem; background: var(--secondary); width: 100%; max-width: 300px; display: none; animation: pulse 0.8s infinite; border-radius: 20px; margin-top: 20px; }
        @keyframes pulse { 0% { transform: scale(1); } 70% { transform: scale(1.05); } 100% { transform: scale(1); } }
        .locked { filter: grayscale(1); opacity: 0.5; pointer-events: none; }

        #chat-box { position: fixed; bottom: 100px; right: 20px; width: 280px; height: 350px; z-index: 500; display: flex; flex-direction: column; overflow: hidden; border-radius: 24px; border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>

<div id="notify-toast">GAME ON! 🚀</div>

<div id="step-1" class="screen">
    <div class="glass p-8 rounded-[32px] w-full max-w-sm text-center">
        <h1 class="text-5xl font-800 mb-2 text-indigo-500 uppercase tracking-tighter">BOOST DA!</h1>
        <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest mb-6">Multiplayer Speed Game</p>
        <input type="text" id="username" placeholder="Nickname" class="w-full bg-slate-800 border border-slate-700 p-4 rounded-2xl outline-none mb-4 text-center">
        <button class="btn-glow" onclick="goToRooms()">NEXT</button>
    </div>
</div>

<div id="step-2" class="screen hidden">
    <div class="glass p-8 rounded-[32px] w-full max-w-sm text-center">
        <h2 class="text-xl mb-6 font-600">Welcome, <span id="user-span" class="text-emerald-400"></span></h2>
        <button class="btn-glow bg-emerald-500 mb-4" onclick="createRoom()">CREATE NEW ROOM</button>
        <div class="flex items-center gap-2 mb-4">
            <hr class="flex-1 opacity-20"> <span class="text-[10px] font-800 opacity-40">OR</span> <hr class="flex-1 opacity-20">
        </div>
        <input type="text" id="join-code" placeholder="4-Digit Code" maxlength="4" class="w-full bg-slate-800 border border-slate-700 p-4 rounded-2xl outline-none mb-4 text-center uppercase">
        <button class="btn-glow" onclick="joinRoom()">JOIN ROOM</button>
    </div>
</div>

<div id="step-3" class="screen hidden">
    <div class="glass p-8 rounded-[32px] w-full max-w-sm text-center">
        <h3 class="text-lg font-800 mb-2">Room: <span id="code-span" class="text-indigo-400"></span></h3>
        <div id="lobby-list" class="flex flex-wrap justify-center gap-2 mb-6"></div>
        
        <div id="host-config" class="hidden space-y-4 mb-6 p-4 bg-white/5 rounded-2xl">
            <p class="text-[10px] font-800 uppercase text-indigo-300">Host Settings: Cards per player</p>
            <div class="flex gap-2">
                <button onclick="setCardLimit(3)" id="btn-3" class="flex-1 py-2 rounded-xl bg-indigo-600 font-800 border-2 border-indigo-400">3 CARDS</button>
                <button onclick="setCardLimit(5)" id="btn-5" class="flex-1 py-2 rounded-xl bg-slate-700 font-800 border-2 border-transparent">5 CARDS</button>
            </div>
        </div>

        <input type="text" id="card-name" placeholder="Your Secret Word (e.g. LION)" class="w-full bg-slate-800 p-4 rounded-2xl mb-4 text-center">
        <button class="btn-glow" onclick="enterGame()">READY TO PLAY</button>
    </div>
</div>

<div id="game-screen" class="screen hidden">
    <div class="fixed top-6 w-full px-6 flex justify-between items-center z-50">
        <div class="flex flex-col">
            <span id="room-display" class="text-[10px] font-800 opacity-60">CODE: ----</span>
            <span id="score-display" class="text-emerald-400 font-800 text-lg">PTS: 0</span>
        </div>
        <div class="flex gap-2">
            <button onclick="toggleMic()" id="mic-btn" class="p-3 bg-slate-800 rounded-xl text-rose-500"><i class="fa fa-microphone-slash"></i></button>
            <button onclick="toggleChat()" class="p-3 bg-slate-800 rounded-xl text-indigo-400"><i class="fa fa-comment"></i></button>
        </div>
    </div>

    <div id="active-players" class="mt-20 flex flex-wrap justify-center gap-4"></div>
    <h3 id="status-text" class="text-yellow-400 font-800 text-center my-6 text-sm uppercase tracking-widest">Wait for Host...</h3>

    <div class="flex gap-2 flex-wrap justify-center" id="my-hand"></div>
    <button id="boost-btn" class="btn-glow" onclick="pressBoost()">🚀 BOOST!!</button>

    <div id="host-panel" class="hidden fixed bottom-10 flex gap-3 px-6 w-full max-w-sm">
        <button onclick="rollGame()" class="flex-1 py-4 bg-emerald-500 rounded-2xl font-800 shadow-lg">🎲 ROLL</button>
        <button onclick="calcRank()" class="px-6 py-4 bg-rose-500 rounded-2xl font-800 shadow-lg">🔚 END</button>
    </div>
</div>

<div id="chat-box" class="glass hidden">
    <div class="p-3 border-b border-white/10 flex justify-between items-center bg-indigo-500/10">
        <span class="text-[10px] font-800 uppercase">Room Chat</span>
        <button onclick="toggleChat()"><i class="fa fa-times"></i></button>
    </div>
    <div id="chat-msgs" class="flex-1 overflow-y-auto p-4 space-y-2 text-[12px]"></div>
    <div class="p-2 bg-slate-900 flex gap-2">
        <input type="text" id="chat-input" placeholder="Type..." class="flex-1 bg-transparent border-none outline-none text-xs">
        <button onclick="sendMsg()" class="text-indigo-400 p-2"><i class="fa fa-paper-plane"></i></button>
    </div>
</div>

<div id="rank-screen" class="screen hidden">
    <div class="glass p-8 rounded-[32px] w-full max-w-sm text-center">
        <h2 class="text-3xl font-800 text-yellow-400 mb-6 italic">🏆 CHAMPIONS</h2>
        <div id="rank-list" class="space-y-3 mb-6"></div>
        <button class="btn-glow" onclick="location.reload()">HOME</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, push, update, get, remove, onChildAdded } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBLX8s2CgDR1Ft8C33wLWvowKYrX98UeAA",
        authDomain: "boost-48cf6.firebaseapp.com",
        databaseURL: "https://boost-48cf6-default-rtdb.firebaseio.com",
        projectId: "boost-48cf6",
        appId: "1:303447637204:web:075099afdcc912eebfcf41"
    };

    const AGORA_APP_ID = "01e39fd5fde54f2ca6c93c2f0c641ff5";
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const rtc = { client: AgoraRTC.createClient({ mode: "rtc", codec: "vp8" }), localAudioTrack: null };

    let myId, myName, myRoom, cardLimit = 3, amIHost = false, isVoice = false;

    window.goToRooms = () => {
        myName = document.getElementById('username').value.trim();
        if(!myName) return;
        document.getElementById('user-span').innerText = myName;
        showScreen('step-2');
    };

    window.createRoom = () => {
        myRoom = Math.random().toString(36).substring(2, 6).toUpperCase();
        amIHost = true;
        set(ref(db, `rooms/${myRoom}/config`), { cardLimit: 3 });
        enterConfig();
    };

    window.joinRoom = () => {
        myRoom = document.getElementById('join-code').value.trim().toUpperCase();
        if(myRoom.length !== 4) return alert("Enter 4-digit code");
        enterConfig();
    };

    window.setCardLimit = (num) => {
        cardLimit = num;
        update(ref(db, `rooms/${myRoom}/config`), { cardLimit: num });
    };

    function enterConfig() {
        document.getElementById('code-span').innerText = myRoom;
        showScreen('step-3');
        onValue(ref(db, `rooms/${myRoom}/players`), (snap) => {
            const data = snap.val();
            if(!data) { amIHost = true; } 
            else {
                const ids = Object.keys(data);
                amIHost = ids[0] === myId;
                if(!ids.includes(myId) && myId) location.reload(); // Removed by host
            }
            if(amIHost) document.getElementById('host-config').classList.remove('hidden');
            
            const players = data ? Object.values(data) : [];
            document.getElementById('lobby-list').innerHTML = players.map(p => `
                <div class="group relative">
                    <span class="px-3 py-1 bg-indigo-500/20 border border-indigo-500/30 rounded-full text-[10px] font-800 uppercase">${p.name}</span>
                    ${amIHost && p.id !== myId ? `<button onclick="removePlayer('${p.id}')" class="text-rose-500 ml-1 text-[10px]"><i class="fa fa-times-circle"></i></button>` : ''}
                </div>
            `).join('');
        });
        
        onValue(ref(db, `rooms/${myRoom}/config`), (snap) => {
            if(snap.exists()) {
                cardLimit = snap.val().cardLimit;
                document.getElementById('btn-3').className = cardLimit === 3 ? 'flex-1 py-2 rounded-xl bg-indigo-600 font-800 border-2 border-indigo-400' : 'flex-1 py-2 rounded-xl bg-slate-700 font-800 border-2 border-transparent';
                document.getElementById('btn-5').className = cardLimit === 5 ? 'flex-1 py-2 rounded-xl bg-indigo-600 font-800 border-2 border-indigo-400' : 'flex-1 py-2 rounded-xl bg-slate-700 font-800 border-2 border-transparent';
            }
        });
    }

    window.removePlayer = (id) => remove(ref(db, `rooms/${myRoom}/players/${id}`));

    window.enterGame = () => {
        const myCard = document.getElementById('card-name').value.trim().toUpperCase();
        if(!myCard) return alert("Enter your secret card!");
        myId = myName.replace(/\s+/g, '') + "_" + Math.floor(Math.random()*999);
        
        set(ref(db, `rooms/${myRoom}/players/${myId}`), { id: myId, name: myName, cardType: myCard, hand: [], score: 0 });
        document.getElementById('room-display').innerText = "CODE: " + myRoom;
        showScreen('game-screen');
        syncArena();
        initChat();
    };

    function showNotify(text) {
        const toast = document.getElementById('notify-toast');
        toast.innerText = text;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);
    }

    function syncArena() {
        onValue(ref(db, `rooms/${myRoom}`), (snap) => {
            const data = snap.val(); if(!data) return;
            const pIds = Object.keys(data.players);
            const playerList = pIds.map(id => data.players[id]);
            
            amIHost = pIds[0] === myId;
            document.getElementById('host-panel').classList.toggle('hidden', !amIHost);

            document.getElementById('active-players').innerHTML = playerList.map(p => `
                <div class="flex flex-col items-center">
                    <div class="w-12 h-12 bg-slate-800 rounded-full flex items-center justify-center border-2 ${p.isTalking ? 'border-rose-500 animate-pulse' : 'border-indigo-500/30'}">
                        <span class="font-800 text-indigo-400">${p.name[0]}</span>
                    </div>
                    <span class="text-[9px] font-800 mt-1 uppercase">${p.name}</span>
                </div>
            `).join('');

            const me = data.players[myId];
            if(!me) location.reload(); // Host removed me
            document.getElementById('score-display').innerText = `PTS: ${me.score || 0}`;
            renderHand(me.hand || []);

            const boostBtn = document.getElementById('boost-btn');
            const isMatching = me.hand?.length === cardLimit && me.hand.every(v => v === me.hand[0]);

            if (data.boostTriggeredBy || isMatching) {
                boostBtn.style.display = 'block';
                const alreadyBoosted = data.boostRace && Object.values(data.boostRace).some(r => r.uid === myId);
                boostBtn.classList.toggle('locked', alreadyBoosted);
                document.getElementById('status-text').innerText = alreadyBoosted ? "BOOSTED! WAIT..." : "🚨 BOOST NOW!!";
            } else {
                boostBtn.style.display = 'none';
                document.getElementById('status-text').innerText = "PASS CARDS TO MATCH";
            }

            if(data.isOver) showRank(playerList);
        });
    }

    window.rollGame = () => {
        get(ref(db, `rooms/${myRoom}/players`)).then(snap => {
            const players = Object.values(snap.val());
            let deck = [];
            players.forEach(p => { for(let i=0; i<cardLimit; i++) deck.push(p.cardType); });
            deck = deck.sort(() => Math.random() - 0.5);

            players.forEach(p => {
                update(ref(db, `rooms/${myRoom}/players/${p.id}`), { hand: deck.splice(0, cardLimit) });
            });
            update(ref(db, `rooms/${myRoom}`), { boostTriggeredBy: null, boostRace: null, isOver: false });
            showNotify("CARDS ROLLED! GO!");
        });
    };

    function renderHand(hand) {
        const container = document.getElementById('my-hand');
        container.innerHTML = '';
        hand.forEach((c, i) => {
            const div = document.createElement('div');
            div.className = 'card';
            div.innerText = c;
            div.onclick = () => passCard(i, hand);
            container.appendChild(div);
        });
    }

    async function passCard(idx, hand) {
        const snap = await get(ref(db, `rooms/${myRoom}/players`));
        const players = Object.values(snap.val());
        const myIdx = players.findIndex(p => p.id === myId);
        const nextP = players[(myIdx + 1) % players.length];
        
        let newMe = [...hand];
        const card = newMe.splice(idx, 1)[0];
        let nextHand = nextP.hand || [];
        
        if(nextHand.length >= cardLimit + 1) return;

        nextHand.push(card);
        update(ref(db, `rooms/${myRoom}/players/${myId}`), { hand: newMe });
        update(ref(db, `rooms/${myRoom}/players/${nextP.id}`), { hand: nextHand });
    }

    window.pressBoost = () => {
        get(ref(db, `rooms/${myRoom}`)).then(snap => {
            const data = snap.val();
            if(data.boostRace && Object.values(data.boostRace).some(r => r.uid === myId)) return;
            if(!data.boostTriggeredBy) update(ref(db, `rooms/${myRoom}`), { boostTriggeredBy: myId });
            push(ref(db, `rooms/${myRoom}/boostRace`), { uid: myId, time: Date.now() });
        });
    };

    window.calcRank = async () => {
        const snap = await get(ref(db, `rooms/${myRoom}`));
        const data = snap.val();
        const race = data.boostRace ? Object.values(data.boostRace).sort((a,b) => a.time - b.time) : [];
        const rewardPts = [2000, 1500, 1000, 800, 500];
        
        // Notify Winner
        if(race.length > 0) {
            const winner = data.players[race[0].uid].name;
            showNotify(`🏆 ${winner} is the Winner!`);
        }

        const updates = {};
        race.forEach((r, i) => {
            const p = data.players[r.uid];
            updates[`rooms/${myRoom}/players/${r.uid}/score`] = (p.score || 0) + (rewardPts[i] || 400);
        });

        // Set others to 400 if they didn't boost
        Object.keys(data.players).forEach(id => {
            const didBoost = race.find(r => r.uid === id);
            if(!didBoost) updates[`rooms/${myRoom}/players/${id}/score`] = (data.players[id].score || 0) + 400;
        });

        await update(ref(db), updates);
        update(ref(db, `rooms/${myRoom}`), { isOver: true });
    };

    // Chat Logic
    function initChat() {
        onChildAdded(ref(db, `rooms/${myRoom}/chat`), (snap) => {
            const m = snap.val();
            const div = document.getElementById('chat-msgs');
            div.innerHTML += `<div><b class="text-indigo-400">${m.u}:</b> ${m.t}</div>`;
            div.scrollTop = div.scrollHeight;
            if(m.u !== myName) showNotify(`💬 ${m.u}: ${m.t}`);
        });
    }

    window.toggleChat = () => document.getElementById('chat-box').classList.toggle('hidden');
    window.sendMsg = () => {
        const input = document.getElementById('chat-input');
        if(!input.value.trim()) return;
        push(ref(db, `rooms/${myRoom}/chat`), { u: myName, t: input.value.trim() });
        input.value = "";
    };

    function showRank(list) {
        showScreen('rank-screen');
        const sorted = list.sort((a,b) => (b.score || 0) - (a.score || 0));
        document.getElementById('rank-list').innerHTML = sorted.map((p, i) => `
            <div class="flex justify-between items-center p-4 bg-white/5 rounded-2xl border border-white/10">
                <span class="font-800">#${i+1} ${p.name}</span>
                <span class="text-emerald-400 font-800">${p.score} PTS</span>
            </div>
        `).join('');
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
    }

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    window.toggleMic = async () => {
        isVoice = !isVoice;
        const btn = document.getElementById('mic-btn');
        if(isVoice) {
            try {
                await rtc.client.join(AGORA_APP_ID, myRoom, null, null);
                rtc.localAudioTrack = await AgoraRTC.createMicrophoneAudioTrack();
                await rtc.client.publish([rtc.localAudioTrack]);
                btn.className = "p-3 bg-emerald-500 rounded-xl text-white";
                btn.innerHTML = '<i class="fa fa-microphone"></i>';
                update(ref(db, `rooms/${myRoom}/players/${myId}`), { isTalking: true });
            } catch(e) { isVoice = false; }
        } else {
            await rtc.client.leave();
            btn.className = "p-3 bg-slate-800 rounded-xl text-rose-500";
            btn.innerHTML = '<i class="fa fa-microphone-slash"></i>';
            update(ref(db, `rooms/${myRoom}/players/${myId}`), { isTalking: false });
        }
    };
</script>
</body>
</html>
